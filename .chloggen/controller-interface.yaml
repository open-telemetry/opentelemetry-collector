change_type: enhancement
component: pkg/exporterhelper
note: >
  Add `RequestMiddleware` open interface to `xexporterhelper` and wire it into the
  queue sender, enabling extensions to intercept outbound export requests for
  adaptive concurrency control, circuit breaking, and rate limiting.
issues: [14080, 14318]
subtext: |
  ## New capability: request_middlewares in sending_queue

  The `sending_queue` config block now accepts an optional `request_middlewares`
  list of extension component IDs. Each extension must implement the
  `xexporterhelper.RequestMiddleware` open interface. Middlewares are chained in
  the order listed; the first listed is the outermost wrapper.

  This feature is behind the alpha feature gate `exporter.RequestMiddleware`.
  Enable it with `--feature-gates=exporter.RequestMiddleware=true`.

  Example configuration:
    exporters:
      otlp:
        sending_queue:
          enabled: true
          num_consumers: 50
          request_middlewares:
            - adaptive_concurrency/my_arc

  ## Interface design (follows docs/rfcs/component-interfaces.md)

  `xexporterhelper.RequestMiddleware` is an open/optional interface per the
  merged component-interface RFC. Extensions implement it; exporterhelper
  discovers it via type assertion at Start() time.

  - `WrapSender(RequestMiddlewareSettings, Sender[Request]) (Sender[Request], error)`
    wraps the outbound sender with custom request execution logic.
  - `WrapSenderFunc` is the companion function type with nil-safe no-op behaviour,
    allowing embedding to automatically satisfy the interface.
  - `var _ RequestMiddleware = (*WrapSenderFunc)(nil)` compile-time assertion added.
  - `xexporterhelper/xexporterhelpertest` subpackage added with `NewNop()` and
    `NewErr()` test helpers per RFC requirement for every public interface package.

  ## Internal cleanup (RFC compliance)

  - Removed the duplicate `RequestMiddleware` interface from the internal
    `requestmiddleware` package. That package now only exports
    `RequestMiddlewareSettings`. The internal queue sender uses a local unexported
    `senderWrapper` interface for the type assertion, avoiding two exported symbols
    with the same name.
  - Removed dead `middleware` field and its initialisation block from
    `base_exporter.go` (leftover from an earlier design iteration, never populated).
  - `featuregate` promoted to a direct dependency in `go.mod`.

  ## Adaptive concurrency extension (extension/adaptiveconcurrencyextension)

  A reference implementation of the `RequestMiddleware` interface is provided as
  `extension/adaptiveconcurrencyextension`. It uses an AIMD (Additive Increase /
  Multiplicative Decrease) algorithm to gate outbound request concurrency based on
  downstream health signals:

  - Hard backpressure: HTTP 429, HTTP 503, gRPC RESOURCE_EXHAUSTED, gRPC UNAVAILABLE
    detected via `ClassifyErrorReason` — triggers multiplicative decrease.
  - Soft backpressure: RTT spike above 2× EWMA baseline — triggers additive decrease.
  - Additive increase on success: limit grows by 1 per successful measurement period.
  - The extension also implements `extensionmiddleware.HTTPServer` and
    `extensionmiddleware.GRPCServer` for ingress-side adaptive concurrency.
  - HTTP/gRPC server-side method signatures corrected to match the
    `extensionmiddleware` interfaces (GetHTTPHandler now returns
    WrapHTTPHandlerFunc; GetGRPCServerOptions now takes context.Context).

  ## Benchmark evidence (issue #14080)

  Two benchmark suites are added to validate the measurable outcomes promised in
  the issue:

  BenchmarkQueueSender_Comparison (exporter/exporterhelper/internal):
    Six synthetic backend scenarios × three configs (StaticLow / StaticHigh / ARC).
    Key result — BackendOverload scenario: ARC delivers 4× more successful ops than
    StaticHigh (170 vs 40/300) while StaticHigh hits 87 % error rate.

  BenchmarkARC_vs_Static (extension/adaptiveconcurrencyextension):
    Four real HTTP/gRPC backend scenarios × three configs using actual httptest.Server
    and gRPC status mocks. Key result — HTTP and gRPC overload scenarios: ARC converges
    max_in_flight to the backend's actual limit and achieves 0 % error rate, while
    StaticHigh hits 87–92 % error rate (260–275 dropped requests out of 300).

  End-to-end integration tests in extension_mock_backend_test.go verify the full path:
    mock HTTP 429 / HTTP 503 / gRPC RESOURCE_EXHAUSTED / gRPC UNAVAILABLE
    → adaptiveSender.Send → ctrl.Record → ClassifyErrorReason → AIMD backoff.
