change_type: enhancement

# The name of the component, e.g. pkg/confighttp, receiver/otlp, exporter/debug
component: cmd/mdatagen

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add override_value support for resource_attributes config

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [15109]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Users can now set a static override_value for any resource attribute in their collector
  configuration, overriding values set programmatically by the component. This is useful
  when receivers have no knowledge of certain resource attributes (e.g. service.namespace,
  service.name for remote database instances) and users need to specify them directly.

