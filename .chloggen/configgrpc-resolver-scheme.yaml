# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. receiver/otlp)
component: config/configgrpc

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add resolver_scheme field to ClientConfig to control the gRPC name resolver scheme, enabling passthrough mode to bypass DNS resolution in IPv4-only environments

# One or more tracking issues or pull requests related to the change
issues: [14990]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  After the migration from grpc.DialContext to grpc.NewClient, the default resolver
  scheme changed from "passthrough" to "dns". Combined with grpc-go v1.77.0+ making
  Happy Eyeballs (RFC 8305) mandatory, this causes IPv6 connection attempts first in
  dual-stack DNS environments. The new resolver_scheme field supports "dns" (default),
  "passthrough", and any custom registered scheme.

# Optional: The change log or logs in which this entry should be included.
# e.g. '[user]' or '[user, api]'
# Include 'user' if the change is relevant to end users.
# Include 'api' if there is a change to a library API.
# Default: '[user]'
change_logs: [user, api]
