change_type: enhancement

component: cmd/mdatagen

note: support runtime metric-name prefix on generated TelemetryBuilder

issues: [14038]

subtext: |
  metadata.yaml gains an opt-in telemetry.allow_name_substitution flag. When
  set, the generated TelemetryBuilder strips the implicit "otelcol_" prefix
  from every metric name and exposes a required WithMetricNamePrefix(prefix)
  option; NewTelemetryBuilder returns an error if the option is missing or
  empty. The generated AssertEqual* helpers in metadatatest accept a matching
  WithMetricNamePrefix option for test-side metric lookup. This unblocks
  sharing telemetry across component kinds (e.g. exporterhelper invoked from
  a processor) by requiring each call site to supply the prefix appropriate
  to its kind, such as "otelcol_exporter_" or "otelcol_processor_".

