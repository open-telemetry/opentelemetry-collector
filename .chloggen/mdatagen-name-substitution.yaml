change_type: enhancement

component: cmd/mdatagen

note: support runtime metric-name prefix substitution in generated TelemetryBuilder

issues: [14038]

subtext: |
  metadata.yaml gains an opt-in telemetry.allow_name_substitution flag. When set,
  the generated TelemetryBuilder exposes a WithMetricNamePrefixReplacement(old,
  new) option, and the generated AssertEqual* helpers in metadatatest accept a
  matching option. This unblocks reusing exporterhelper telemetry from a
  processor context by allowing "otelcol_exporter_*" metric names to be
  rewritten to "otelcol_processor_*" at builder-construction time, with
  anchored prefix validation that fails fast on misconfiguration.

change_logs: [api]
