subtext: |
  The processor reports otelcol_processor_batch_batch_send_size and
  otelcol_processor_batch_batch_send_size_bytes, matching the batch processor.
  The underlying exporterhelper telemetry is disabled so no exporter_-prefixed
  series are emitted. See docs/rfcs/batching-migration.md.

