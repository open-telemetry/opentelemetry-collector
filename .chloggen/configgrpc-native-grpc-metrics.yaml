# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. receiver/otlp)
component: config/configgrpc

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: "Add alpha feature gate `configgrpc.nativeGRPCMetrics` to enable native gRPC OpenTelemetry metrics (grpc.client.attempt.*, grpc.server.call.*) alongside the existing otelgrpc instrumentation."

# One or more tracking issues or pull requests related to the change
issues: [15169]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  When the `configgrpc.nativeGRPCMetrics` feature gate is enabled, the native gRPC
  OpenTelemetry plugin (`google.golang.org/grpc/stats/opentelemetry`) is registered as
  an additional stats handler alongside `otelgrpc`. This exposes metrics not available
  from `otelgrpc`, including per-attempt latency and compressed message sizes that are
  useful for observing retry behavior. The existing `rpc.*` metrics from `otelgrpc` are
  unaffected. The feature gate is disabled by default.

