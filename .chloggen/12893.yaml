# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: bug_fix

# The name of the component, or a single word describing the area of concern, (e.g. otlpreceiver)
component: exporterhelper

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: "Prevents the exporter for being stuck when telemetry data is bigger than batch.max_size"

# One or more tracking issues or pull requests related to the change
issues: [12893]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  This change fixes a bug where the exporter would get stuck when the telemetry data is bigger than batch.max_size. The bug
  was causing the OpenTelemetry Collector to hang and being OOM Killed at some point.

  New internal metrics are added to track the number of of items not being exported due to batching errors:
    - otelcol_exporter_batch_failed_log_records
    - otelcol_exporter_batch_failed_metric_points
    - otelcol_exporter_batch_failed_spans

# Optional: The change log or logs in which this entry should be included.
# e.g. '[user]' or '[user, api]'
# Include 'user' if the change is relevant to end users.
# Include 'api' if there is a change to a library API.
# Default: '[user]'
change_logs: []
