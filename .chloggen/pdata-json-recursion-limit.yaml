# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: bug_fix

# The name of the component, or a single word describing the area of concern, (e.g. receiver/otlp)
component: pkg/pdata

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Enforce a recursion depth limit when unmarshalling JSON, preventing a stack overflow from deeply nested `AnyValue` payloads.

# One or more tracking issues or pull requests related to the change
issues: [15603]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Mirrors the proto unmarshal recursion limit on the JSON path: an `AnyValue` nesting arrays or
  key-value lists of `AnyValue`s past the limit now returns an error instead of
  recursing until the goroutine stack overflows (an unrecoverable crash). Reachable via the public
  `JSONUnmarshaler` from components that decode untrusted OTLP/JSON without a request-size cap. The
  limit is set high enough (well beyond any realistic telemetry nesting) that well-formed payloads
  are unaffected.
