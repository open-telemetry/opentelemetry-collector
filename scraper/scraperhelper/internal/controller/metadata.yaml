type: scraperhelper/controller
github_project: open-telemetry/opentelemetry-collector
parent: scraperhelper

status:
  disable_codecov_badge: true
  class: pkg

exported_configs:
  controller_config:
    description: Defines common settings for a scraper controller configuration. Scraper controller receivers can embed this struct, instead of receiver.Settings, and extend it with more fields if needed.
    type: object
    properties:
      collection_interval:
        description: Sets how frequently the scraper should be called and used as the context timeout to ensure that scrapers don't exceed the interval.
        type: string
        x-customType: time.Duration
        format: duration
        default: 1m
      initial_delay:
        description: Sets the initial start delay for the scraper, any non positive value is assumed to be immediately.
        type: string
        x-customType: time.Duration
        format: duration
        default: 1s
      timeout:
        description: An optional value used to set scraper's context deadline.
        type: string
        x-customType: time.Duration
        format: duration
        default: 0
    go_struct:
      custom_validator:
        name: validateControllerConfig
