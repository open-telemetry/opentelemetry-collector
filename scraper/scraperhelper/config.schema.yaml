$defs:
  controller_config:
    description: ControllerConfig defines common settings for a scraper controller configuration. Scraper controller receivers can embed this struct, instead of receiver.Settings, and extend it with more fields if needed.
    type: object
    properties:
      collection_interval:
        description: CollectionInterval sets how frequently the scraper should be called and used as the context timeout to ensure that scrapers don't exceed the interval.
        type: string
        x-customType: time.Duration
        format: duration
      initial_delay:
        description: InitialDelay sets the initial start delay for the scraper, any non positive value is assumed to be immediately.
        type: string
        x-customType: time.Duration
        format: duration
      timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        x-customType: time.Duration
        format: duration
  schedule_config:
    description: ScheduleConfig defines the interval and timing for one collection schedule. Used for per-metric or per-event collection_interval.
    type: object
    properties:
      collection_interval:
        description: CollectionInterval sets how frequently this schedule's scraper should be called.
        type: string
        x-customType: time.Duration
        format: duration
      initial_delay:
        description: InitialDelay sets the initial start delay for this schedule.
        type: string
        x-customType: time.Duration
        format: duration
      timeout:
        description: Timeout is an optional value used to set this schedule's scraper context deadline.
        type: string
        x-customType: time.Duration
        format: duration
