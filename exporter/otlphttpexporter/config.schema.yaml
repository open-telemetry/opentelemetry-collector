$defs:
  encoding_type:
    description: EncodingType defines the type for content encoding
    type: string
  retry_config:
    description: RetryConfig extends the standard BackOffConfig with the OTLP-HTTP-specific retryable-status-code list.
    type: object
    properties:
      retryable_statuses:
        description: 'RetryableStatuses lists the HTTP response status codes that should trigger a retry. Defaults to [429, 502, 503, 504] per the OTLP specification: https://opentelemetry.io/docs/specs/otlp/#failures-1 Override this only when the backend returns non-spec-compliant retryable status codes, such as an intermediary (proxy, load balancer, or CDN) that returns a 5xx status outside the OTLP spec set.'
        type: array
        items:
          type: integer
    allOf:
      - $ref: /config/configretry.back_off_config
description: Config defines configuration for OTLP/HTTP exporter.
type: object
properties:
  encoding:
    description: 'The encoding to export telemetry (default: "proto")'
    $ref: encoding_type
  logs_endpoint:
    description: The URL to send logs to. If omitted the Endpoint + "/v1/logs" will be used.
    type: string
  metrics_endpoint:
    description: The URL to send metrics to. If omitted the Endpoint + "/v1/metrics" will be used.
    type: string
  profiles_endpoint:
    description: The URL to send profiles to. If omitted the Endpoint + "/v1development/profiles" will be used.
    type: string
  retry_on_failure:
    $ref: retry_config
  sending_queue:
    x-optional: true
    $ref: /exporter/exporterhelper.queue_batch_config
  traces_endpoint:
    description: The URL to send traces to. If omitted the Endpoint + "/v1/traces" will be used.
    type: string
allOf:
  - $ref: /config/confighttp.client_config
