description: |
  Config defines configuration for OTLP exporter. A non-empty `endpoint` (from the squashed gRPC ClientConfig) is required.
type: object
properties:
  retry_on_failure:
    description: Retry/back-off settings applied to failed export requests.
    $ref: /config/configretry.back_off_config
  sending_queue:
    description: Configuration for the optional in-memory sending queue. When unset the exporter sends synchronously.
    x-optional: true
    $ref: /exporter/exporterhelper.queue_batch_config
allOf:
  - $ref: /exporter/exporterhelper.timeout_config
  - $ref: /config/configgrpc.client_config
