type: queuebatch

status:
  disable_codecov_badge: true
  class: processor
  stability:
    development: [traces, metrics, logs]
  distributions: []
  codeowners:
    active: [jmacd]

tests:

# Note: the metric names below intentionally match those emitted by the
# batchprocessor (otelcol_processor_batch_*). The queuebatchprocessor is the
# exporterhelper-based replacement for batchprocessor, and retaining the same
# names keeps existing dashboards working across the migration. These metrics
# are recorded by this processor's own instrumentation; the underlying
# exporterhelper telemetry is disabled (see processor.go).
telemetry:
  metrics:
    processor_batch_batch_send_size:
      enabled: true
      stability: development
      description: Number of units in the batch
      unit: "{unit}"
      histogram:
        value_type: int
        bucket_boundaries:
          [
            10,
            25,
            50,
            75,
            100,
            250,
            500,
            750,
            1000,
            2000,
            3000,
            4000,
            5000,
            6000,
            7000,
            8000,
            9000,
            10000,
            20000,
            30000,
            50000,
            100000,
          ]
    processor_batch_batch_send_size_bytes:
      enabled: true
      stability: development
      description: Number of bytes in batch that was sent. Only available on detailed level.
      unit: By
      histogram:
