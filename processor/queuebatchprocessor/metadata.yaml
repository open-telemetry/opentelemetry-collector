type: queuebatch

status:
  disable_codecov_badge: true
  class: processor
  stability:
    development: [traces, metrics, logs]
  distributions: []
  codeowners:
    active: [jmacd]

tests:

# This processor is built on the exporterhelper queue/batch sender, whose own
# telemetry is disabled (see processor.go). It instead reports the standard
# processor item counters (otelcol_processor_incoming_items and
# otelcol_processor_outgoing_items, matching processorhelper) plus two
# queue/batch-specific histograms.
#
# The histograms are only collected at the "detailed" telemetry level: they are
# dropped by views below detailed (see service/internal/metricviews/views.go)
# and their recording is skipped via the instrument Enabled() check, because
# histograms are relatively expensive and the byte size is costly to compute.
telemetry:
  metrics:
    processor_incoming_items:
      enabled: true
      stability: alpha
      description: Number of items passed to the processor.
      unit: "{item}"
      sum:
        value_type: int
        monotonic: true
    processor_outgoing_items:
      enabled: true
      stability: alpha
      description: Number of items emitted from the processor.
      unit: "{item}"
      sum:
        value_type: int
        monotonic: true
    processor_queuebatch_bytes:
      enabled: true
      stability: development
      description: Number of bytes in each batch emitted from the processor. Only collected at detailed telemetry level.
      unit: By
      histogram:
        value_type: int
        bucket_boundaries:
          [
            10,
            25,
            50,
            75,
            100,
            250,
            500,
            750,
            1000,
            2000,
            3000,
            4000,
            5000,
            6000,
            7000,
            8000,
            9000,
            10000,
            20000,
            30000,
            50000,
            100_000,
            200_000,
            300_000,
            400_000,
            500_000,
            600_000,
            700_000,
            800_000,
            900_000,
            1000_000,
            2000_000,
            3000_000,
            4000_000,
            5000_000,
            6000_000,
            7000_000,
            8000_000,
            9000_000,
          ]
    processor_queuebatch_items:
      enabled: true
      stability: development
      description: Number of items in each batch emitted from the processor. Only collected at detailed telemetry level.
      unit: "{item}"
      histogram:
        value_type: int
        bucket_boundaries:
          [
            10,
            25,
            50,
            75,
            100,
            250,
            500,
            750,
            1000,
            2000,
            3000,
            4000,
            5000,
            6000,
            7000,
            8000,
            9000,
            10000,
            20000,
            30000,
            50000,
            100000,
          ]
