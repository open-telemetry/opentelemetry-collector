type: queuebatch

status:
  disable_codecov_badge: true
  class: processor
  stability:
    development: [traces, metrics, logs, profiles]
  distributions: []
  codeowners:
    active: [jmacd]

# Note queuebatch_bytes and queuebatch_items are copied from
# ../batchprocessor/metadata.yaml, incoming_items and outgoing_items
# are copied from ../processorhelper.
telemetry:
  metrics:
    processor_incoming_items:
      enabled: true
      stability: alpha
      description: Number of items entering the queue.
      unit: "{item}"
      sum:
        value_type: int
        monotonic: true
    processor_outgoing_items:
      enabled: true
      stability: alpha
      description: Number of items exiting in batches.
      unit: "{item}"
      sum:
        value_type: int
        monotonic: true
    processor_queuebatch_bytes:
      enabled: true
      stability: development
      description: Batch size in bytes.
      unit: By
      histogram:
        value_type: int
        bucket_boundaries:
          [
            10,
            25,
            50,
            75,
            100,
            250,
            500,
            750,
            1000,
            2000,
            3000,
            4000,
            5000,
            6000,
            7000,
            8000,
            9000,
            10000,
            20000,
            30000,
            50000,
            100_000,
            200_000,
            300_000,
            400_000,
            500_000,
            600_000,
            700_000,
            800_000,
            900_000,
            1000_000,
            2000_000,
            3000_000,
            4000_000,
            5000_000,
            6000_000,
            7000_000,
            8000_000,
            9000_000,
          ]
    processor_queuebatch_items:
      enabled: true
      stability: development
      description: Batch size in items.
      unit: "{item}"
      histogram:
        value_type: int
        bucket_boundaries:
          [
            10,
            25,
            50,
            75,
            100,
            250,
            500,
            750,
            1000,
            2000,
            3000,
            4000,
            5000,
            6000,
            7000,
            8000,
            9000,
            10000,
            20000,
            30000,
            50000,
            100000,
          ]
