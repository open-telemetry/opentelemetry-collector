display_name: Memory Limiter Processor
type: memory_limiter
github_project: open-telemetry/opentelemetry-collector

status:
  disable_codecov_badge: true
  class: processor
  stability:
    alpha: [profiles]
    beta: [traces, metrics, logs]
  distributions: [core, contrib, k8s]

tests:
  config:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 50

telemetry:
  metrics:
    processor_accepted_log_records:
      enabled: true
      description: Number of log records successfully pushed into the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{record}"
      sum:
        value_type: int
        monotonic: true

    processor_accepted_metric_points:
      enabled: true
      description: Number of metric points successfully pushed into the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{datapoint}"
      sum:
        value_type: int
        monotonic: true

    processor_accepted_spans:
      enabled: true
      description: Number of spans successfully pushed into the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{span}"
      sum:
        value_type: int
        monotonic: true

    processor_memory_limiter_limit_bytes:
      enabled: true
      description: The hard memory limit (in bytes) configured on this memory limiter processor instance, derived from limit_mib or limit_percentage * total_memory. Useful as a static denominator for capacity utilization dashboards.
      stability: development
      unit: "By"
      gauge:
        value_type: int

    processor_memory_limiter_spike_limit_bytes:
      enabled: true
      description: The spike (soft) memory limit (in bytes) configured on this memory limiter processor instance. The processor starts refusing data when Alloc >= (limit - spike). This is the soft threshold.
      stability: development
      unit: "By"
      gauge:
        value_type: int

    processor_refused_log_records:
      enabled: true
      description: Number of log records that were rejected by the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{record}"
      sum:
        value_type: int
        monotonic: true

    processor_refused_metric_points:
      enabled: true
      description: Number of metric points that were rejected by the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{datapoint}"
      sum:
        value_type: int
        monotonic: true

    processor_refused_spans:
      enabled: true
      description: Number of spans that were rejected by the next component in the pipeline.
      stability: deprecated
      deprecated:
        since: "0.110.0"
        note: "This metric is deprecated"
      unit: "{span}"
      sum:
        value_type: int
        monotonic: true
