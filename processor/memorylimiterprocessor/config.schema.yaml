description: |
  Config for the memory_limiter processor. Aliases the shared memorylimiter.Config. `check_interval` must be greater than zero; one of `limit_mib` or `limit_percentage` must be greater than zero; spike limits must be smaller than the corresponding hard limit; percentage values must not exceed 100.
type: object
allOf:
  - $ref: /internal/memorylimiter.config
