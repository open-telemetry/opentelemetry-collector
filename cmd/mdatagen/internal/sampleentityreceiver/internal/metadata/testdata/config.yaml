default:
all_set:
  metrics:
    k8s.pod.cpu_time:
      enabled: true
    k8s.pod.phase:
      enabled: true
    k8s.replicaset.desired:
      enabled: true
  resource_attributes:
    k8s.namespace.name:
      enabled: true
    k8s.pod.name:
      enabled: true
    k8s.pod.uid:
      enabled: true
    k8s.replicaset.name:
      enabled: true
    k8s.replicaset.uid:
      enabled: true
none_set:
  metrics:
    k8s.pod.cpu_time:
      enabled: false
    k8s.pod.phase:
      enabled: false
    k8s.replicaset.desired:
      enabled: false
  resource_attributes:
    k8s.namespace.name:
      enabled: false
    k8s.pod.name:
      enabled: false
    k8s.pod.uid:
      enabled: false
    k8s.replicaset.name:
      enabled: false
    k8s.replicaset.uid:
      enabled: false
filter_set_include:
  resource_attributes:
    k8s.namespace.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    k8s.pod.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    k8s.pod.uid:
      enabled: true
      metrics_include:
        - regexp: ".*"
    k8s.replicaset.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    k8s.replicaset.uid:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    k8s.namespace.name:
      enabled: true
      metrics_exclude:
        - strict: "k8s.namespace.name-val"
    k8s.pod.name:
      enabled: true
      metrics_exclude:
        - strict: "k8s.pod.name-val"
    k8s.pod.uid:
      enabled: true
      metrics_exclude:
        - strict: "k8s.pod.uid-val"
    k8s.replicaset.name:
      enabled: true
      metrics_exclude:
        - strict: "k8s.replicaset.name-val"
    k8s.replicaset.uid:
      enabled: true
      metrics_exclude:
        - strict: "k8s.replicaset.uid-val"
