type: samplepkg
display_name: Sample Package
description: This package is used for testing purposes to check the output of mdatagen.

status:
  disable_codecov_badge: true
  class: pkg

exported_configs:
  port_number:
    type: integer
    description: A port number to connect to.
    x-customType: int32
    minimum: 1
    maximum: 65535
  sample_config:
    type: object
    properties:
      host_name:
        type: string
        description: The host name to connect to.
        default: "localhost"
        minLength: 1
      port:
        $ref: port_number
        description: The port to connect to.
        default: 8080
        maximum: 10000
    required:
      - host_name
  pair:
    type: object
    description: Pair is an element of a MapList, consisting of a name and a value.
    properties:
      name:
        type: string
        description: The name of the pair.
      value:
        type: string
        description: The value of the pair.
  map_list:
    type: array
    description: MapList is a list of name/value pairs.
    items:
      $ref: pair
