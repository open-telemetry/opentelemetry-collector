type: samplepkg
display_name: Sample Package
description: This package is used for testing purposes to check the output of mdatagen.

status:
  disable_codecov_badge: true
  class: pkg

telemetry:
  # Opt into the variation-aware naming scheme. When set, NewTelemetryBuilder
  # takes a required positional "variation" argument and every metric is
  # emitted as "otelcol_<variation>_<key>". This is the mechanism used by
  # code reused across component kinds: the exporter call site passes
  # "exporter", the processor call site passes "processor".
  allow_name_variation: true
  metrics:
    enqueue_failed_log_records:
      enabled: true
      stability: alpha
      description: Number of log records failed to be added to the sending queue.
      unit: "{record}"
      sum:
        value_type: int
        monotonic: true
    queue_batch_send_size:
      enabled: true
      stability: development
      description: Number of units in the batch
      unit: "{unit}"
      histogram:
        value_type: int
        bucket_boundaries: [10, 100, 1000]
    queue_size:
      enabled: true
      stability: alpha
      description: Current size of the retry queue (in batches).
      unit: "{batch}"
      gauge:
        value_type: int
        async: true

exported_configs:
  sample_config:
    type: object
    properties:
      host_name:
        type: string
        description: The host name to connect to.
        default: "localhost"
        minLength: 1
      port:
        type: string
        description: The port to connect to.
        default: "8080"
    required:
      - host_name
      - port
