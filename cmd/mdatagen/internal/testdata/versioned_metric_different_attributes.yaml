type: testversioned
sem_conv_version: 1.9.0
status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: []

feature_gates:
  - id: receiver.testversioned.DontEmitV0SystemConventions
    description: When enabled, semconv legacy attributes are disabled.
    stage: alpha
    from_version: v0.145.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45592
  - id: receiver.testversioned.EmitV1SystemConventions
    description: When enabled, semconv stable attributes are enabled.
    stage: alpha
    from_version: v0.145.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45592

attributes:
  cpu:
    description: Logical CPU number starting at 0.
    type: string
    requirement_level: recommended

  cpu.logical_number:
    description: The logical CPU number [0, n-1].
    type: int

  state:
    description: CPU state
    type: string
    enum: [idle, user, system]

  state.cpu:
    description: CPU state
    type: string
    enum: [idle, user, system]

metrics:
  # Legacy metric - uses map key as emitted name
  system.cpu.time:
    enabled: true
    description: Legacy CPU time metric
    stability: deprecated
    unit: s
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [cpu, state]
    migration:
      to: system.cpu.time@v1
      through_gates:
        disable_old: receiver.testversioned.DontEmitV0SystemConventions
        enable_new: receiver.testversioned.EmitV1SystemConventions
    warnings:
      if_enabled: This metric is deprecated, use system.cpu.time/v2 instead.

  # New semconv metric - different config key, same emitted name
  system.cpu.time@v1:
    enabled: true
    description: CPU time metric per new semantic conventions
    stability: beta
    unit: s
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [cpu.logical_number, state.cpu]

