type: samplemigration
display_name: Sample Migration Scraper
description: Demonstrates dual-schema metric migration with feature gates and name aliasing.
github_project: open-telemetry/opentelemetry-collector

status:
  disable_codecov_badge: true
  class: scraper
  stability:
    beta: [metrics, logs]
  distributions: []

config:
  type: object
  description: Configuration for the Sample Migration Scraper.
  allOf:
    - $ref: ./internal/metadata.metrics_builder_config
  properties:
    emit_legacy_metrics:
      description: Whether to emit legacy metric names alongside new ones.
      type: boolean
      default: false

feature_gates:
  - id: scraper.samplemigration.DontEmitV0SystemConventions
    description: When enabled, semconv legacy attributes are disabled.
    stage: alpha
    from_version: v0.145.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45592
  - id: scraper.samplemigration.EmitV1SystemConventions
    description: When enabled, semconv stable attributes are enabled.
    stage: alpha
    from_version: v0.145.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45592

attributes:
  cpu:
    description: Logical CPU number starting at 0.
    type: string
    requirement_level: recommended

  cpu.logical_number:
      description: The logical CPU number [0, n-1].
      type: string

  state:
    description: Breakdown of CPU usage by type.
    type: string
    requirement_level: recommended
    enum: [idle, interrupt, nice, softirq, steal, system, user, wait]

metrics:
  # Metric that has been renamed (legacy -> new)
  linux.memory.available:
    enabled: false
    description: Legacy Linux available memory estimate.
    stability: beta
    unit: By
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
    migration:
      to: system.memory.linux.available
      through_gates:
        disable_old: scraper.samplemigration.DontEmitV0SystemConventions
        enable_new: scraper.samplemigration.EmitV1SystemConventions

  # Completely new metric introduced normally
  system.cpu.foo:
    enabled: false
    description: Example v1-only metric, disabled by default.
    stability: beta
    unit: "1"
    gauge:
      value_type: double

  # Metric that keeps the same visible name but changes type (gauge -> sum)
  system.cpu.utilization:
    enabled: true
    description: CPU utilization as a ratio.
    stability: beta
    unit: "1"
    gauge:
      value_type: double
    migration:
      to: system.cpu.utilization@v1
      through_gates:
        disable_old: scraper.samplemigration.DontEmitV0SystemConventions
        enable_new: scraper.samplemigration.EmitV1SystemConventions
    attributes: [cpu, state]

  system.cpu.utilization@v1:
    # Emit under the stable user-facing name
    enabled: false
    description: CPU utilization as a monotonic cumulative sum.
    stability: beta
    unit: "1"
    sum:
      value_type: double
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [cpu.logical_number, state]

  system.memory.linux.available:
    enabled: false
    description: An estimate of how much memory is available without swapping. (Linux only)
    stability: beta
    unit: By
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
