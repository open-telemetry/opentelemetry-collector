default:
all_set:
  metrics:
    linux.memory.available:
      enabled: true
    system.cpu.foo:
      enabled: true
    system.cpu.utilization:
      enabled: true
      attributes: ["cpu","state"]
    system.cpu.utilization@v1:
      enabled: true
      attributes: ["cpu.logical_number","cpu.mode"]
    system.memory.linux.available:
      enabled: true
reaggregate_set:
  metrics:
    linux.memory.available:
      enabled: true
    system.cpu.foo:
      enabled: true
    system.cpu.utilization:
      enabled: true
      attributes: []
    system.cpu.utilization@v1:
      enabled: true
      attributes: []
    system.memory.linux.available:
      enabled: true
none_set:
  metrics:
    linux.memory.available:
      enabled: false
    system.cpu.foo:
      enabled: false
    system.cpu.utilization:
      enabled: false
      attributes: ["cpu","state"]
    system.cpu.utilization@v1:
      enabled: false
      attributes: ["cpu.logical_number","cpu.mode"]
    system.memory.linux.available:
      enabled: false
