    default.metric:
      enabled: true
      attributes: ["string_attr","state","enum_attr","slice_attr","map_attr"]
    default.metric.to_be_removed:
      enabled: true
    metric.input_type:
      enabled: true
      attributes: ["string_attr","state","enum_attr","slice_attr","map_attr"]
    optional.metric:
      enabled: true
      attributes: ["string_attr","boolean_attr","boolean_attr2"]
    optional.metric.empty_unit:
      enabled: true
      attributes: ["string_attr","boolean_attr"]
    reaggregate.metric:
      enabled: true
      attributes: ["string_attr","boolean_attr"]
    system.cpu.time:
      enabled: true
  resource_attributes:
    map.resource.attr:
      enabled: true
    optional.resource.attr:
      enabled: true
    slice.resource.attr:
      enabled: true
    string.enum.resource.attr:
      enabled: true
    string.resource.attr:
      enabled: true
    string.resource.attr_disable_warning:
      enabled: true
    string.resource.attr_remove_warning:
      enabled: true
    string.resource.attr_to_be_removed:
      enabled: true
reaggregate_set:
  metrics:
    default.metric:
      enabled: true
      attributes: []
    default.metric.to_be_removed:
      enabled: true
    metric.input_type:
      enabled: true
      attributes: []
    optional.metric:
      enabled: true
      attributes: []
    optional.metric.empty_unit:
      enabled: true
      attributes: []
    reaggregate.metric:
      enabled: true
      attributes: []
    system.cpu.time:
      enabled: true
  resource_attributes:
    map.resource.attr:
      enabled: true
    optional.resource.attr:
      enabled: true
    slice.resource.attr:
      enabled: true
    string.enum.resource.attr:
      enabled: true
    string.resource.attr:
      enabled: true
    string.resource.attr_disable_warning:
      enabled: true
    string.resource.attr_remove_warning:
      enabled: true
    string.resource.attr_to_be_removed:
      enabled: true
none_set:
  metrics:
    default.metric:
      enabled: false
      attributes: ["string_attr","state","enum_attr","slice_attr","map_attr"]
    default.metric.to_be_removed:
      enabled: false
    metric.input_type:
      enabled: false
      attributes: ["string_attr","state","enum_attr","slice_attr","map_attr"]
    optional.metric:
      enabled: false
      attributes: ["string_attr","boolean_attr","boolean_attr2"]
    optional.metric.empty_unit:
      enabled: false
      attributes: ["string_attr","boolean_attr"]
    reaggregate.metric:
      enabled: false
      attributes: ["string_attr","boolean_attr"]
    system.cpu.time:
      enabled: false
  resource_attributes:
    map.resource.attr:
      enabled: false
    optional.resource.attr:
      enabled: false
    slice.resource.attr:
      enabled: false
    string.enum.resource.attr:
      enabled: false
    string.resource.attr:
      enabled: false
    string.resource.attr_disable_warning:
      enabled: false
    string.resource.attr_remove_warning:
      enabled: false
    string.resource.attr_to_be_removed:
      enabled: false
override_set:
  resource_attributes:
    map.resource.attr:
      enabled: true
      override_value:
        override_key: "override-val"
    optional.resource.attr:
      enabled: true
      override_value: "override-optional.resource.attr"
    slice.resource.attr:
      enabled: true
      override_value: ["override-item1", "override-item2"]
    string.enum.resource.attr:
      enabled: true
      override_value: "override-string.enum.resource.attr"
    string.resource.attr:
      enabled: true
      override_value: "override-string.resource.attr"
    string.resource.attr_disable_warning:
      enabled: true
      override_value: "override-string.resource.attr_disable_warning"
    string.resource.attr_remove_warning:
      enabled: true
      override_value: "override-string.resource.attr_remove_warning"
    string.resource.attr_to_be_removed:
      enabled: true
      override_value: "override-string.resource.attr_to_be_removed"
filter_set_include:
  resource_attributes:
    map.resource.attr:
      enabled: true
      metrics_include:
        - regexp: ".*"
    optional.resource.attr:
      enabled: true
      metrics_include:
        - regexp: ".*"
    slice.resource.attr:
      enabled: true
      metrics_include:
        - regexp: ".*"
    string.enum.resource.attr:
      enabled: true
      metrics_include:
        - regexp: ".*"
    string.resource.attr:
      enabled: true
      metrics_include:
        - regexp: ".*"
    string.resource.attr_disable_warning:
      enabled: true
      metrics_include:
        - regexp: ".*"
    string.resource.attr_remove_warning:
      enabled: true
      metrics_include:
        - regexp: ".*"
    string.resource.attr_to_be_removed:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    map.resource.attr:
      enabled: true
      metrics_exclude:
        - regexp: ".*"
    optional.resource.attr:
      enabled: true
      metrics_exclude:
        - strict: "optional.resource.attr-val"
    slice.resource.attr:
      enabled: true
      metrics_exclude:
        - regexp: ".*"
    string.enum.resource.attr:
      enabled: true
      metrics_exclude:
        - strict: "one"
    string.resource.attr:
      enabled: true
      metrics_exclude:
        - strict: "string.resource.attr-val"
    string.resource.attr_disable_warning:
      enabled: true
      metrics_exclude:
        - strict: "string.resource.attr_disable_warning-val"
    string.resource.attr_remove_warning:
      enabled: true
      metrics_exclude:
        - strict: "string.resource.attr_remove_warning-val"
    string.resource.attr_to_be_removed:
      enabled: true
      metrics_exclude:
        - strict: "string.resource.attr_to_be_removed-val"
