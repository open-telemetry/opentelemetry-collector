type: sampletelemetrysubstitution
github_project: open-telemetry/opentelemetry-collector

status:
  disable_codecov_badge: true
  class: pkg
  stability:
    beta: [traces, metrics, logs]

telemetry:
  # Opt into the WithMetricNamePrefixReplacement option on the generated
  # TelemetryBuilder. Exercises mdatagen's runtime metric-name prefix
  # substitution feature.
  allow_name_substitution: true
  metrics:
    exporter_enqueue_failed_log_records:
      enabled: true
      stability: alpha
      description: Number of log records failed to be added to the sending queue.
      unit: "{record}"
      sum:
        value_type: int
        monotonic: true
    exporter_queue_batch_send_size:
      enabled: true
      stability: development
      description: Number of units in the batch
      unit: "{unit}"
      histogram:
        value_type: int
        bucket_boundaries: [10, 100, 1000]
    exporter_queue_size:
      enabled: true
      stability: alpha
      description: Current size of the retry queue (in batches).
      unit: "{batch}"
      gauge:
        value_type: int
        async: true
