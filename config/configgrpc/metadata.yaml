type: config/configgrpc
parent: config
github_project: open-telemetry/opentelemetry-collector

status:
  disable_codecov_badge: true
  class: pkg

feature_gates:
  - id: configgrpc.nativeGRPCMetrics
    description: 'When enabled, registers google.golang.org/grpc/stats/opentelemetry as an additional stats handler alongside otelgrpc. This exposes gRPC-native metrics (grpc.client.attempt.*, grpc.server.call.*) that are not available from otelgrpc, such as per-attempt latency and compressed message sizes useful for observing retry behavior.'
    stage: alpha
    from_version: 'v0.155.0'
    reference_url: 'https://github.com/open-telemetry/opentelemetry-collector/issues/15169'
    skip_strict_validation: true
